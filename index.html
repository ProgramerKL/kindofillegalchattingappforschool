<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google News</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- NEWS VIEW (visible by default) -->
    <div id="news-view">
        <header class="news-header">
            <div class="news-logo">
                <span class="logo-g">G</span><span class="logo-o1">o</span><span class="logo-o2">o</span><span class="logo-g2">g</span><span class="logo-l">l</span><span class="logo-e">e</span>
                <span class="logo-news">News</span>
            </div>
            <div class="region-selector">
                <label for="region-dropdown">Region:</label>
                <div class="dropdown-wrapper">
                    <input type="text" id="region-dropdown" placeholder="Select region..." autocomplete="off">
                    <div class="dropdown-menu" id="dropdown-menu">
                        <div class="dropdown-item">United States</div>
                        <div class="dropdown-item">United Kingdom</div>
                        <div class="dropdown-item">Canada</div>
                        <div class="dropdown-item">Australia</div>
                        <div class="dropdown-item">India</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="news-content">
            <img src="news-screenshot.png" alt="News articles" class="news-screenshot">
        </main>
    </div>

    <!-- CHAT VIEW (hidden by default) -->
    <div id="chat-view" class="hidden">
        <div class="chat-app">
            <div class="chat-sidebar">
                <div class="chat-sidebar-header">
                    <h2>Secret Chat</h2>
                    <span id="presence-count">0 online</span>
                </div>
                <div class="chat-list" id="chat-list"></div>
                <button id="new-chat-btn" class="new-chat-btn">+ New Room</button>
                <button id="back-to-news" class="back-to-news-btn">Back to News</button>
            </div>
            <div class="chat-main">
                <div class="chat-main-header">
                    <span class="chat-main-avatar">💬</span>
                    <span id="chat-main-name">General</span>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-bar">
                    <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                    <button id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="chat.js"></script>
</body>
</html>
